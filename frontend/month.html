<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ACNH Fish</title>

    <!-------------------------------------------------------------
        Author: Arnett, Jeremy
        FORMAT - Shift + ALT + F to format
        ----------------------------------------------------------------->

    <script src="month.js" defer></script>

    <link rel="stylesheet" type="text/css" href="addfish.css">

</head>

<body>

    <button onclick="window.location.href = 'http://localhost:3000/main.html'">Search by fish</button>


    <form id="monthFinder">
        <select id="selectedMonth" required>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <input type="radio" id="NH" name="hemisphere" value="NH" checked>
        <label for="NH">Northern Hemisphere</label>
        <input type="radio" id="SH" name="hemisphere" value="SH">
        <label for="SH">Southern Hemisphere</label>

        <button id="Submit">Submit</button>
    </form>

    <table id="pondTable"></table>
    <table id="riverTable"></table>
    <table id="seaTable"></table>

    <p></p>
</body>

</html>
